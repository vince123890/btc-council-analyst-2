<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BTC Intelligence · Bandarmologi Live</title>
  <meta name="description" content="Bitcoin trading dashboard with live tick data and AI bandarmologi analysis powered by Google Gemini." />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%82%BF%3C/text%3E%3C/svg%3E" />

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@300;400;500&display=swap"
    rel="stylesheet"
  />

  <style>
    body { font-family: 'JetBrains Mono', ui-monospace, monospace; background: #000; color: #fafafa; }
    .serif { font-family: 'Instrument Serif', serif; font-weight: 400; }
    .sans { font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; }
    .tabular-nums { font-variant-numeric: tabular-nums; }

    @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    .pulse-dot { animation: pulse-dot 1.5s ease-in-out infinite; }

    @keyframes shimmer { 0% { background-position: -1000px 0; } 100% { background-position: 1000px 0; } }
    .shimmer {
      background: linear-gradient(90deg, transparent 0%, rgba(59, 130, 246, 0.18) 50%, transparent 100%);
      background-size: 1000px 100%;
      animation: shimmer 2s infinite linear;
    }

    @keyframes spin { from { transform: rotate(0); } to { transform: rotate(360deg); } }
    .spin { animation: spin 1s linear infinite; display: inline-block; }

    @keyframes slide-down { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    .slide-down { animation: slide-down 0.22s ease-out; }

    @keyframes progress-bar { 0% { width: 0%; } 100% { width: 100%; } }
    .progress-bar { animation: progress-bar 30s linear forwards; }

    /* Hide spin buttons di number input */
    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  </style>
</head>
<body class="min-h-screen">
  <div id="app" class="max-w-7xl mx-auto p-6"></div>
  <script src="./app.js"></script>
</body>
</html>
